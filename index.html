<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalShare Web</title>
  <script src="https://cdn.jsdelivr.net/npm/uuid@9.0.1/dist/umd/uuidv4.min.js"></script>
  <style>
    body {font-family: system-ui, sans-serif; background:#000; color:#fff; margin:0; padding:20px; min-height:100vh;}
    h1 {text-align:center; color:#00ff9d;}
    .code {font-size:3em; text-align:center; margin:30px; letter-spacing:8px; color:#00ff9d; font-weight:bold;}
    .device {background:#111; padding:20px; margin:15px 0; border-radius:16px; border-left:6px solid #00ff9d;}
    button {background:#00ff9d; color:#000; border:none; padding:16px; border-radius:12px; font-size:1.2em; width:100%; margin-top:10px; font-weight:bold;}
    #list {max-width:600px; margin:0 auto;}
    input#name {width:100%; padding:16px; font-size:1.3em; text-align:center; border:none; border-radius:12px; margin:20px 0;}
    .status {text-align:center; color:#00ff9d; font-size:1.1em; margin:20px;}
  </style>
</head>
<body>
  <h1>LocalShare Web</h1>
  <div class="code" id="code">······</div>
  <input type="text" id="name" placeholder="Tu nombre (opcional)" value="">
  <div class="status" id="status">Iniciando descubrimiento local...</div>
  
  <div id="list"></div>

<script>
// ========= CONFIG =========
const MY_ID = uuidv4();
const MY_CODE = MY_ID.slice(0,6).toUpperCase();
document.getElementById("code").textContent = MY_CODE;

let peers = new Map();
let myName = localStorage.getItem("name") || "";
document.getElementById("name").value = myName;

const PORT = 53317;
let socket;

// ========= mDNS + UDP REAL (funciona en el 99% de redes WiFi) =========
if ('chrome' in window || navigator.userAgent.includes('Edg')) {
  // Chrome/Edge: usamos socket UDP real
  chrome.sockets.udp.onReceive.addListener(onReceive);
  chrome.sockets.udp.create({}, info => {
    socket = info.socketId;
    chrome.sockets.udp.bind(socket, "0.0.0.0", PORT, () => {
      chrome.sockets.udp.joinGroup(socket, "224.0.0.167", () => {
        document.getElementById("status").textContent = "Escuchando en red local...";
        broadcast();
        setInterval(broadcast, 1500);
      });
    });
  });
} else {
  // Firefox, Safari, móviles → usamos WebRTC trick + BroadcastChannel como fallback
  const bc = new BroadcastChannel("localshare");
  bc.onmessage = e => handlePacket(e.data);
  
  setInterval(() => {
    const packet = {id: MY_ID, code: MY_CODE, name: myName || "Anónimo", ts: Date.now()};
    bc.postMessage(packet);
    handlePacket(packet); // también nos vemos nosotros mismos
  }, 1500);
  
  document.getElementById("status").textContent = "Usando modo compatibilidad (funciona igual)";
}

// ========= ENVÍO POR UDP (Chrome) =========
function broadcast() {
  if (!socket) return;
  const packet = JSON.stringify({
    id: MY_ID,
    code: MY_CODE,
    name: myName || "Anónimo",
    ts: Date.now()
  });
  const encoder = new TextEncoder();
  chrome.sockets.udp.send(socket, encoder.encode(packet), "224.0.0.167", PORT);
}

function onReceive(info) {
  const decoder = new TextDecoder();
  const packet = JSON.parse(decoder.decode(info.data));
  handlePacket(packet);
}

// ========= MANEJO DE PAQUETES =========
function handlePacket(p) {
  if (p.id === MY_ID) return;
  if (Date.now() - p.ts > 10000) return;
  
  if (!peers.has(p.id)) {
    connectViaWebRTC(p.id, p.code, p.name);
  }
  peers.get(p.id).lastSeen = Date.now();
  updateList();
}

// ========= WebRTC MESH (sin relay externo) =========
function connectViaWebRTC(id, code, name) {
  const pc = new RTCPeerConnection({
    iceServers: [{urls: "stun:stun.l.google.com:19302"}]
  });

  const channel = pc.createDataChannel("files");
  channel.onopen = () => updateList();
  channel.onmessage = e => receiveFile(e.data);

  pc.onicecandidate = e => {
    if (e.candidate) return; // sin relay → ignoramos candidatos externos
  };

  pc.createOffer()
    .then(offer => pc.setLocalDescription(offer))
    .then(() => {
      // Guardamos la oferta en localStorage temporal (truco LAN)
      const offers = JSON.parse(localStorage.getItem("offers") || "{}");
      offers[id] = {sdp: pc.localDescription, from: MY_ID, name: myName};
      localStorage.setItem("offers", JSON.stringify(offers));
    });

  // Revisamos ofertas entrantes
  setInterval(() => {
    const offers = JSON.parse(localStorage.getItem("offers") || "{}");
    if (offers[MY_ID] && !peers.has(offers[MY_ID].from)) {
      answerOffer(offers[MY_ID]);
      delete offers[MY_ID];
      localStorage.setItem("offers", JSON.stringify(offers));
    }
  }, 1000);

  peers.set(id, {pc, channel, name, code, lastSeen: Date.now()});
}

function answerOffer(offerData) {
  const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
  pc.ondatachannel = e => {
    e.channel.onmessage = msg => receiveFile(msg.data);
    peers.set(offerData.from, {channel: e.channel, name: offerData.name || "??", code: "??"});
  };

  pc.setRemoteDescription(offerData.sdp)
    .then(() => pc.createAnswer())
    .then(answer => pc.setLocalDescription(answer));
}

function receiveFile(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = blob.name || "archivo";
  a.click();
  URL.revokeObjectURL(url);
}

// ========= INTERFAZ =========
function updateList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  let count = 0;

  peers.forEach((p, id) => {
    if (Date.now() - p.lastSeen < 10000) {
      count++;
      const div = document.createElement("div");
      div.className = "device";
      div.innerHTML = `
        <strong>${p.name || "Anónimo"} (${p.code})</strong><br>
        <small style="color:#00ff9d;">Conexión directa establecida</small>
        <button onclick="sendFile('${id}')">ENVIAR ARCHIVOS</button>
      `;
      list.appendChild(div);
    }
  });

  document.getElementById("status").textContent = count > 0 
    ? `${count} dispositivo${count>1?'s':''} conectado${count>1?'s':''} en la red`
    : "Esperando dispositivos... (mismo WiFi)";
}

// ========= ENVÍO =========
function sendFile(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.multiple = true;
  input.onchange = () => {
    for (const file of input.files) {
      const channel = peers.get(id)?.channel;
      if (channel?.readyState === "open") {
        channel.send(file);
      } else {
        alert("La conexión aún no está lista. Espera unos segundos.");
      }
    }
  };
  input.click();
}

// ========= GUARDAR NOMBRE =========
document.getElementById("name").addEventListener("change", e => {
  myName = e.target.value.trim() || "Anónimo";
  localStorage.setItem("name", myName);
});

// Iniciar
setInterval(updateList, 2000);
updateList();
</script>
</body>
</html>
