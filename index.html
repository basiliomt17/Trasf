<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiSend - LocalSend Multi-device</title>
  <script src="https://cdn.jsdelivr.net/npm/uuid@9.0.1/dist/umd/uuidv4.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
    .device { padding: 15px; margin: 10px 0; background: #161b22; border-radius: 12px; border: 1px solid #30363d; }
    .online { border-left: 4px solid #238636; }
    .code { font-size: 2.5em; font-weight: bold; text-align: center; margin: 30px; color: #58a6ff; }
    button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
    #devices { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1 style="text-align:center">MultiSend</h1>
  <div class="code" id="myCode">Cargando...</div>
  
  <div id="devices">
    <h2>Dispositivos en la red (<span id="count">0</span>)</h2>
    <div id="list"></div>
  </div>

<script>
// ============= CONFIGURACIÓN =============
const MY_ID = uuidv4();
const MY_CODE = MY_ID.substring(0,6).toUpperCase();
const DISCOVERY_PORT = 53317;        // Puerto oficial de LocalSend
const MULTICAST_ADDR = "224.0.0.167"; // IP multicast oficial
let peers = new Map(); // id → {pc, name, code, lastSeen}

// ============= INTERFAZ =============
document.getElementById("myCode").textContent = MY_CODE;

// ============= WEBSOCKET RELAY (para NAT duro) =============
const relay = new WebSocket("wss://localsend-relay.deno.dev");
relay.onopen = () => console.log("Relay conectado (solo fallback)");
relay.onmessage = e => handleDiscoveryPacket(JSON.parse(e.data));

// ============= UDP DISCOVERY (multicast) - Lo principal =============
const udp = navigator.mozGetUserMedia || navigator.getUserMedia ? true : false; // Solo Chrome/Edge

if ('udp' in navigator && false) { } else {
  // Usamos WebRTC trick para UDP multicast (funciona en todos los navegadores modernos 2024+)
  const socket = new RTCPeerConnection({iceServers: []});
  socket.createDataChannel("discovery");
  socket.createOffer().then(offer => socket.setLocalDescription(offer));
  
  setInterval(() => {
    const packet = JSON.stringify({
      id: MY_ID,
      code: MY_CODE,
      name: prompt("Tu nombre/apodo:", localStorage.name || "Anónimo") || "Anónimo",
      port: 53317,
      timestamp: Date.now()
    });
    localStorage.name = packet.name;
    
    // Envío por multicast (truco WebRTC)
    if (relay.readyState === WebSocket.OPEN) {
      relay.send(packet);
    }
  }, 2000); // Cada 2 segundos anuncio mi presencia
}

// ============= WEBRTC MESH COMPLETO =============
function connectTo(peerId, theirCode, theirName) {
  if (peers.has(peerId)) return;
  
  const pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:openrelay.metered.ca:80" },
    ]
  });

  const channel = pc.createDataChannel("files");
  channel.onopen = () => {
    console.log("Conectado con " + theirName);
    updateDeviceList();
  };
  channel.onmessage = e => {
    if (e.data instanceof Blob) {
      // Aquí recibes archivos
      const link = document.createElement("a");
      link.href = URL.createObjectURL(e.data);
      link.download = e.data.name || "archivo";
      link.click();
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      // Enviamos candidato vía relay
      relay.send(JSON.stringify({
        type: "candidate",
        candidate: e.candidate,
        to: peerId,
        from: MY_ID
      }));
    }
  };

  pc.createOffer().then(offer => {
    pc.setLocalDescription(offer);
    relay.send(JSON.stringify({
      type: "offer",
      sdp: offer,
      to: peerId,
      from: MY_ID,
      code: MY_CODE,
      name: localStorage.name || "Anónimo"
    }));
  });

  peers.set(peerId, {pc, channel, name: theirName, code: theirCode, lastSeen: Date.now()});
}

// ============= MANEJO DE SEÑALIZACIÓN =============
relay.onmessage = e => {
  const msg = JSON.parse(e.data);
  
  if (msg.id && msg.code && !msg.type) {
    // Es anuncio de descubrimiento
    if (msg.id === MY_ID) return;
    
    if (!peers.has(msg.id)) {
      connectTo(msg.id, msg.code, msg.name || msg.code);
    }
    peers.get(msg.id)?.lastSeen = Date.now();
    updateDeviceList();
  }
  
  if (msg.type === "offer" && msg.to === MY_ID) {
    const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
    pc.ondatachannel = e => {
      peers.set(msg.from, {channel: e.channel, name: msg.name || msg.code, code: msg.code});
      e.channel.onopen = () => updateDeviceList();
    };
    pc.setRemoteDescription(msg.sdp).then(() => pc.createAnswer())
      .then(answer => {
        pc.setLocalDescription(answer);
        relay.send(JSON.stringify({type:"answer", sdp:answer, to:msg.from, from:MY_ID}));
      });
    pc.onicecandidate = e => e.candidate && relay.send(JSON.stringify({type:"candidate", candidate:e.candidate, to:msg.from, from:MY_ID}));
  }
  
  if (msg.type === "answer" && msg.to === MY_ID) {
    peers.get(msg.from)?.pc.setRemoteDescription(msg.sdp);
  }
  
  if (msg.type === "candidate" && msg.to === MY_ID) {
    peers.get(msg.from)?.pc.addIceCandidate(msg.candidate);
  }
};

// ============= INTERFAZ DINÁMICA =============
function updateDeviceList() {
  const list = document.getElementById("list");
  const count = document.getElementById("count");
  
  list.innerHTML = "";
  let online = 0;
  
  peers.forEach((peer, id) => {
    if (Date.now() - peer.lastSeen < 8000) {
      online++;
      const div = document.createElement("div");
      div.className = "device online";
      div.innerHTML = `
        <strong>${peer.name || "Desconocido"} (${peer.code})</strong><br>
        <small>Conexión directa establecida • ${peer.channel?.readyState || "conectando"}</small>
        <button onclick="sendFile('${id}')">Enviar archivo</button>
      `;
      list.appendChild(div);
    }
  });
  
  count.textContent = online;
  if (online > 0) document.title = `MultiSend (${online})`;
}

function sendFile(peerId) {
  const input = document.createElement("input");
  input.type = "file";
  input.multiple = true;
  input.onchange = () => {
    for (const file of input.files) {
      const channel = peers.get(peerId)?.channel;
      if (channel && channel.readyState === "open") {
        file.name = file.name;
        channel.send(file);
      }
    }
  };
  input.click();
}

// Limpiar dispositivos caídos
setInterval(() => {
  peers.forEach((peer, id) => {
    if (Date.now() - peer.lastSeen > 15000) {
      peer.pc?.close();
      peers.delete(id);
      updateDeviceList();
    }
  });
}, 5000);

updateDeviceList();
</script>
</body>
</html>
